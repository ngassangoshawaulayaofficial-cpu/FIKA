name: fika_mobile
description: FIKA - On-demand beauty and grooming marketplace for Dar es Salaam.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase BaaS Integration
  supabase_flutter: ^2.6.0

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2

  # Service Locator / Dependency Injection
  get_it: ^7.6.0

  # HTTP Client (optional fallback)
  http: ^1.2.0

  # UI & Styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Geolocation & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.3

  # Utility / Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
